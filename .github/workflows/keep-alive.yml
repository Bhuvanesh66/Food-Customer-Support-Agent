name: Keep Render awake

# Pings the deployed health endpoint on a schedule so the free Render instance
# doesn't spin down after 15 minutes of inactivity (avoids ~50s cold starts).
#
# Notes:
#  • GitHub cron is best-effort and may run a few minutes late under load.
#  • GitHub disables scheduled workflows after 60 days of NO repo activity —
#    any push/commit re-activates it.
#  • This consumes Render free instance-hours (≈750/mo is enough for one service).

on:
  schedule:
    # Every 10 minutes. (Cron is UTC; interval-based so timezone doesn't matter.)
    - cron: '*/10 * * * *'
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://food-customer-support-agent.onrender.com/api/health"
          echo "Pinging $URL"
          # Retry a few times: a cold instance may take ~50s to wake.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 70 "$URL" || echo "000")
            echo "attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "✓ awake"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ health check did not return 200 after retries"
          # Don't fail the workflow on a transient miss — next run will try again.
          exit 0
