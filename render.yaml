# Render.com deployment — single web service (Express serves the React build).
# Docs: https://render.com/docs/blueprint-spec
#
# After connecting this repo as a "Blueprint", set the API keys in the Render
# dashboard (Environment) — they are marked sync:false so they are NOT stored in git.

services:
  - type: web
    name: synapse-ai
    runtime: node
    plan: free
    # The client is prebuilt (client/dist) AND the DB ships pre-seeded
    # (data/app.db) — both committed — because the Vite+Three build and the
    # embedding/seed step each exceed Render free's 512MB. So the host only
    # installs deps + starts: no build, no seed, no OOM.
    # (No persistent disk: it would shadow the committed pre-seeded app.db.
    #  Conversations reset on redeploy, but the knowledge base always works.)
    buildCommand: npm install
    startCommand: npm run deploy:start:preseeded
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      - key: PORT
        value: "8787"
      - key: CLIENT_ORIGIN
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBED_MODEL
        value: gemini-embedding-001
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-4-scout:free
